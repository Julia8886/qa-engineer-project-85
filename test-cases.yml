- summary: |
    Успешный цикл игры и определение победителя 
  requirement: |
    Система должна фиксировать время отправки финального верного решения и мгновенно завершать матч, присуждая победу тому, кто справился быстрее.
  prerequisites: |
    Два пользователя авторизованы и находятся в поиске игры.
  test-data: |
    Игрок А: аккаунт с языком Python
    Игрок Б: аккаунт с языком JavaScript
    Решение: валидный код, проходящий все скрытые тесты задачи
  steps:
    - Нажать кнопку «Найти игру» обоими игроками одновременно.
    - Дождаться автоматического создания игровой комнаты и перенаправления.
    - Игрок А пишет верное решение задачи в редакторе кода.
    - Игрок А нажимает кнопку «Отправить код».
  expected-result: |
    Код Игрока А успешно проходит проверку. Матч мгновенно завершается. 
    Игроку А отображается экран «Победа», Игроку Б — экран «Поражение». 
    Кнопка отправки кода для Игрока Б становится неактивной.

- summary: |
    Проверка лимита времени выполнения кода 
  requirement: |
    Код игроков должен запускаться в изолированных Docker-контейнерах с ограничением по времени выполнения (Timeout — не более 5 секунд).
  prerequisites: |
    Игрок находится внутри игровой комнаты, матч запущен.
  test-data: |
    Код на выбранном языке с бесконечным циклом 
  steps:
    - Ввести в редактор код, содержащий бесконечный цикл.
    - Нажать кнопку «Запустить тесты».
  expected-result: |
    Выполнение кода принудительно прерывается ровно через 5 секунд. 
    Пользователь получает системное сообщение в консоль: «Превышено время ожидания выполнения (Timeout Error)». 
    Платформа и комната продолжают стабильно работать.

- summary: |
    Кратковременный обрыв связи во время матча (Сохранение состояния)
  requirement: |
    Если у игрока пропал интернет или он перезагрузил страницу, написанный им код не должен стереться из редактора при восстановлении сессии.
  prerequisites: |
    Игрок находится в игровой комнате, матч в процессе. В редакторе написана часть кода.
  test-data: |
    Введенный в редактор текст: `def solve(): return True`
  steps:
    - Имитировать потерю интернета на 15 секунд в DevTools (Network -> Offline) или нажать клавишу F5 для перезагрузки страницы.
    - Восстановить подключение к сети / дождаться полной перезагрузки страницы.
  expected-result: |
    Игрок автоматически возвращается в активную игровую комнату. 
    Ранее написанный код полностью сохранен в редакторе. 
    Таймер матча синхронизирован с сервером и показывает актуальное оставшееся время.

- summary: |
    Защита от вставки готового кода из буфера обмена 
  requirement: |
    В игровом редакторе должна быть заблокирована возможность вставки текста из буфера обмена, чтобы игроки писали код самостоятельно.
  prerequisites: |
    Игрок находится в игровой комнате. В буфере обмена операционной системы скопирован любой текст.
  test-data: |
    Скопированная строка: `print("Hello World")`
  steps:
    - Установить курсор внутрь текстового редактора Codebattle.
    - Попытаться вставить текст с помощью горячих клавиш Ctrl+V (или Cmd+V).
    - Попытаться вставить текст через контекстное меню мыши (Правый клик -> Вставить).
  expected-result: |
    Вставка текста полностью заблокирована. Скопированный код не появляется в редакторе.

- summary: |
    Автоматическое завершение «брошенных» матчей 
  requirement: |
    Если один из игроков покинул страницу игры и не возвращается более 2 минут, матч должен автоматически завершаться техническим поражением ушедшего.
  prerequisites: |
    Игрок А и Игрок Б находятся в комнате, матч начался.
  test-data: |
    Таймаут отсутствия = 2 минуты.
  steps:
    - Игрок Б полностью закрывает вкладку браузера с игрой.
    - Игрок А остается в комнате и продолжает писать код.
    - Подождать ровно 2 минуты.
  expected-result: |
    Через 2 минуты матч автоматически прерывается. Игроку А выводится экран 
    «Техническая победа». Система корректно обновляет глобальный рейтинг обоих игроков.
    
- summary: |
    Успешная регистрация нового аккаунта с валидными данными
  requirement: |
    Пользователь должен иметь возможность создать аккаунт
  prerequisites: |
    Открыта страница регистрации, пользователь не авторизован в системе
  test-data: |
    Email = new_user_2026@example.com
    Пароль = ValidPassword123!
    Подтверждение пароля = ValidPassword123!
  steps:
    - Вводим валидный Email в соответствующее поле
    - Вводим надежный Пароль в поле ввода пароля
    - Вводим тот же пароль в поле подтверждения пароля
    - Нажимаем кнопку «Зарегистрироваться»
  expected-result: |
    Аккаунт успешно создан, пользователь автоматически авторизован или перенаправлен на страницу подтверждения. 
    В базе данных появляется запись о новом пользователе.

- summary: |
    Успешный вход в систему (Авторизация)
  requirement: |
    Пользователь должен иметь возможность войти в систему
  prerequisites: |
    Открыта страница логина, аккаунт пользователя уже зарегистрирован и активирован
  test-data: |
    Логин/Email = user_exists@example.com
    Пароль = CorrectPassword123
  steps:
    - Вводим зарегистрированный Email/Логин
    - Вводим корректный Пароль
    - Нажимаем кнопку «Войти»
  expected-result: |
    Пользователь успешно авторизован и перенаправлен в личный кабинет или на главную страницу системы.

- summary: |
    Успешная загрузка аватара в настройках профиля
  requirement: |
    Пользователь должен иметь возможность настроить свой профиль (выбрать аватар)
  prerequisites: |
    Пользователь авторизован в системе, открыта страница настроек профиля
  test-data: |
    Файл изображения = avatar_image.png (формат PNG, размер 500 КБ)
  steps:
    - Нажимаем на кнопку «Выбрать аватар»
    - Выбираем подготовленный файл изображения на устройстве
    - Нажимаем кнопку «Сохранить изменения»
  expected-result: |
    Изображение успешно загружено на сервер, сохранено в профиле и корректно отображается в блоке аватара пользователя.

- summary: |
    Успешный выбор основного языка программирования в профиле
  requirement: |
    Пользователь должен иметь возможность настроить свой профиль (указать основной язык программирования)
  prerequisites: |
    Пользователь авторизован в системе, открыта страница настроек профиля
  test-data: |
    Выбранное значение = "JavaScript" (из выпадающего списка)
  steps:
    - Нажимаем на выпадающий список «Основной язык программирования»
    - Выбираем из предложенного перечня пункт "JavaScript"
    - Нажимаем кнопку «Сохранить изменения»
  expected-result: |
    Выбранный язык программирования успешно привязан к профилю пользователя и отображается в настройках после обновления страницы.

- summary: |
    Попытка регистрации с несовпадающими паролями 
  requirement: |
    Пользователь должен иметь возможность создать аккаунт (Валидация полей)
  prerequisites: |
    Открыта страница регистрации
  test-data: |
    Email = valid_email@example.com
    Пароль = Password123
    Подтверждение пароля = DifferentPassword456
  steps:
    - Вводим валидный Email
    - Вводим Пароль
    - Вводим отличающийся пароль в поле подтверждения
    - Нажимаем кнопку «Зарегистрироваться»
  expected-result: |
    Регистрация заблокирована. Система выводит сообщение об ошибке валидации: «Пароли не совпадают».

- summary: |
    Попытка загрузки текстового документа вместо изображения аватара 
  requirement: |
    Пользователь должен иметь возможность настроить свой профиль (выбрать аватар, проверка формата)
  prerequisites: |
    Пользователь авторизован, открыта страница настроек профиля
  test-data: |
    Файл = document.txt (неподдерживаемый формат)
  steps:
    - Нажимаем на кнопку «Выбрать аватар»
    - Выбираем текстовый файл на устройстве
    - Пытаемся подтвердить выбор/загрузку
  expected-result: |
    Система блокирует загрузку файла и отображает предупреждение: «Недопустимый формат файла. Разрешены только изображения».

- summary: |
    Успешное создание игры авторизованным пользователем без привязки к языку
  requirement: |
    Система должна поддерживать отложенную инициализацию языка при создании игры.
  prerequisites: |
    Пользователь авторизован в системе, открыта главная страница/лобби.
  test-data: |
    User_ID = 101
  steps:
    - Нажимаем кнопку «Create game»
  expected-result: |
    Игровая сессия успешно создана в статусе "active". 
    Язык программирования на данном этапе отсутствует. 
    Создатель сессии переходит в режим ожидания соперника.

- summary: |
    Отображение созданной игры в списке доступных для подключения
  requirement: |
    Игра должна отображаться в списке «доступных для подключения».
  prerequisites: |
    Первый игрок уже создал игру и находится в режиме ожидания. Второй игрок авторизован и открыл список доступных игр.
  test-data: |
    Game_ID = 777
    User_ID_2 = 102
  steps:
    - Второй игрок обновляет/просматривает список «доступных для подключения» игр
  expected-result: |
    Созданная Первым игроком игра с Game_ID корректно отображается в списке доступных сессий для Второго игрока.

- summary: |
    Подключение второго игрока к игре и переход в игровое пространство
  requirement: |
    Второй игрок подключается по нажатию «Connect to game» с синхронизацией по WebSocket.
  prerequisites: |
    Игра доступна в списке, Второй игрок авторизован.
  test-data: |
    Game_ID = 777
  steps:
    - Второй игрок нажимает кнопку «Connect to game» напротив нужной сессии
  expected-result: |
    Устанавливается постоянное WebSocket-соединение. 
    Оба игрока мгновенно перенаправляются в игровое пространство. 
    Статус сессии успешно обновляется.

- summary: |
    Синхронизация кода в редакторах игроков в реальном времени
  requirement: |
    Реализация двусторонней синхронизации кода в реальном времени (Operational Transformation/CRDT).
  prerequisites: |
    Оба игрока находятся в игровом пространстве. Отображаются два редактора (слева — свой, справа — соперника).
  test-data: |
    Код Первого игрока = "const sum = (a, b) => a + b;"
  steps:
    - Первый игрок начинает вводить код в своем левом редакторе
    - Проверяем экран Второго игрока
  expected-result: |
    Второй игрок в реальном времени видит вводимый Первым игроком код в своем правом редакторе (редакторе соперника). 
    Отсутствуют задержки и конфликты символов.

- summary: |
    Проверка локального кода по кнопке «Check» без ограничений на количество попыток
  requirement: |
    Кнопка «Check» запускает тесты только на локальном коде; количество попыток неограниченно.
  prerequisites: |
    Игроки находятся в игровом процессе, задание и время отображаются сверху.
  test-data: |
    Некорректный код = "function() {}"
  steps:
    - Первый игрок вводит некорректный код и нажимает кнопку «Check»
    - Повторяет нажатие кнопки «Check» 5 раз подряд
  expected-result: |
    Тесты запускаются и возвращают ошибку только для кода Первого игрока (код соперника не затрагивается). 
    Кнопка «Check» не блокируется, позволяя совершать неограниченное количество попыток.

- summary: |
    Восстановление игровой сессии по ID при разрыве соединения
  requirement: |
    Поддержка переподключения при разрыве соединения и восстановление сессии по ID.
  prerequisites: |
    Идет игровой процесс. У Первого игрока происходит кратковременный обрыв интернет-соединения.
  test-data: |
    Game_ID = 777
  steps:
    - Имитируем разрыв связи у Первого игрока на 10 секунд
    - Восстанавливаем соединение и обновляем страницу у Первого игрока
  expected-result: |
    Система успешно восстанавливает WebSocket-сессию по Game_ID. 
    Первый игрок возвращается в то же игровое пространство. 
    Введенный ранее код и код соперника полностью сохранены.

- summary: |
    Фиксация победителя при первом успешном решении задачи
  requirement: |
    При успешной проверке открывается модальное окно, состояние игры переходит в "finished", игра идет до первого решения.
  prerequisites: |
    Оба игрока активно пишут код. Таймер на победу отсутствует.
  test-data: |
    Успешное решение = "return true;"
  steps:
    - Первый игрок вводит верный код и нажимает кнопку «Check»
  expected-result: |
    Тесты проходят успешно. На экранах обоих игроков появляется модальное окно с объявлением победителя. 
    Состояние сессии в системе меняется на "finished".

- summary: |
    Блокировка действий победителя и сохранение возможности работы для проигравшего
  requirement: |
    У победителя блокируется «Check» и появляется «Exit». Проигравший может продолжать писать код.
  prerequisites: |
    Первый игрок признан победителем. Игра в статусе "finished".
  test-data: |
    Код Проигравшего = "let x = 1;"
  steps:
    - Проверяем доступность кнопок у Первого игрока (победителя)
    - Второй игрок (проигравший) продолжает писать код и нажимает кнопку «Check»
  expected-result: |
    У Первого игрока кнопка «Check» заблокирована, отображается кнопка «Exit». 
    Он может наблюдать за соперником. 
    Второй игрок может свободно писать код и запускать его проверку.

- summary: |
    Удаление игры из памяти только после выхода обоих игроков
  requirement: |
    Состояние игры "closed", данные хранятся до полного завершения (выхода обоих участников).
  prerequisites: |
    Игра находится в статусе "finished" (один из игроков победил).
  test-data: |
    Game_ID = 777
  steps:
    - Первый игрок нажимает кнопку «Exit» и покидает игровое пространство
    - Проверяем наличие сессии Game_ID в памяти системы
    - Второй игрок нажимает кнопку «Exit» и покидает игровое пространство
    - Проверяем наличие сессии Game_ID в памяти системы повторно
  expected-result: |
    После выхода Первого игрока сессия сохраняется в памяти (Второй игрок все еще внутри). 
    После выхода Второго игрока статус сессии меняется на "closed", и игра полностью удаляется из оперативной памяти системы.

